<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Usuario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #1f4037, #99f2c8);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      margin-top: 20px;
      animation: fadeIn 1s ease-in-out;
    }

    header, footer {
      text-align: center;
      margin-bottom: 20px;
      color: #fff;
    }

    h1 {
      font-size: 1.8em;
      margin: 0;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      color: #fff;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 1em;
    }

    input[type="color"] {
      padding: 2px;
      height: 40px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      color: #fff;
      font-size: 1.1em;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
    }

    .profile {
      display: flex;
      justify-content: center;
      margin-bottom: 15px;
    }

    .profile img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #fff;
    }

    .registro-card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 20px;
      margin-top: 15px;
      color: #000;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      position: relative;
    }

    .registro-card button {
      background: crimson;
      margin-top: 10px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <h1>Registro de Usuario</h1>
    </header>

    <main>
      <div class="profile">
        <img src="perfil.jpg" alt="Imagen de perfil">
      </div>

      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" required>

      <label for="password">Contraseña (mínimo 8 caracteres):</label>
      <input type="password" id="password" minlength="8" required>

      <label for="fecha">Fecha de nacimiento:</label>
      <input type="date" id="fecha" required>

      <label for="color">Color favorito:</label>
      <input type="color" id="color">

      <label for="pais">País:</label>
      <input list="paises" id="pais" placeholder="Escribe o selecciona">
      <datalist id="paises">
        <option value="México">
        <option value="España">
        <option value="Argentina">
        <option value="Colombia">
        <option value="Chile">
        <option value="Estados Unidos">
      </datalist>

      <button onclick="registrar()">Registrarse</button>
    </main>

    <footer>
      <p>&copy; 2026 Registro de Usuario</p>
    </footer>
  </div>


  <div id="registros"></div>

  <script>
    function registrar() {
      const nombre = document.getElementById("nombre").value;
      const fecha = document.getElementById("fecha").value;
      const color = document.getElementById("color").value;
      const pais = document.getElementById("pais").value;

      if(nombre && fecha && pais) {
        const registrosDiv = document.getElementById("registros");

       
        const card = document.createElement("div");
        card.className = "registro-card";
        card.innerHTML = `
          <p><strong>Nombre:</strong> ${nombre}</p>
          <p><strong>Fecha de nacimiento:</strong> ${fecha}</p>
          <p><strong>Color favorito:</strong> ${color}</p>
          <p><strong>País:</strong> ${pais}</p>
          <button onclick="this.parentElement.remove()">Eliminar registro</button>
        `;

        registrosDiv.appendChild(card);
      } else {
        alert("Por favor completa todos los campos obligatorios.");
      }
    }
  </script>
</body>
</html>
